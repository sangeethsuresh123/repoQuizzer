services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: repoquizzer
      POSTGRES_PASSWORD: repoquizzer
      POSTGRES_DB: repoquizzer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repoquizzer"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://repoquizzer:repoquizzer@postgres:5432/repoquizzer
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL}
      LLAMA_MODEL: ${LLAMA_MODEL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - repos:/app/storage/repos

volumes:
  pgdata:
  repos:
